<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Calendar — PSYCH 302: Neuroscience of the Mind</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --twilight-deep: #0c1525;
      --twilight-mid: #1a2744;
      --twilight-blue: #2a3f6b;
      --mist-purple: #4a3a6b;
      --alpenglow: #d4727a;
      --alpenglow-warm: #e8917a;
      --peak-gold: #f0c8a0;
      --snow-pink: #f2d4d0;
      --sky-coral: #c85a6a;
      --text-primary: #f0e8e5;
      --text-secondary: #b8a8b8;
      --text-muted: #7a6a82;
      --quiz-color: #5a9ad4;
      --midterm-color: #d4727a;
      --lecture-color: #f0c8a0;
      --section-color: #5abb7a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--twilight-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 100% 40% at 50% 0%, rgba(160,120,136,0.07) 0%, transparent 60%),
        linear-gradient(180deg, #10182a 0%, #0c1525 100%);
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 32px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--alpenglow); }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 32px;
      padding: 44px 28px 36px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      animation: fadeIn 0.6s ease-out;
    }
    .hero .overline {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 3.5px;
      text-transform: uppercase; color: var(--alpenglow); margin-bottom: 8px;
    }
    .hero h1 {
      font-size: 1.8rem; font-weight: 800; line-height: 1.2; margin-bottom: 8px;
      background: linear-gradient(135deg, #f0e8e5 0%, #f0c8a0 50%, #d4727a 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero p { font-size: 0.92rem; color: var(--text-secondary); }

    /* Legend */
    .legend {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    /* Calendar nav */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .cal-nav button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-secondary);
      border-radius: 8px;
      padding: 8px 16px;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cal-nav button:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
    }
    .cal-nav .month-label {
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 180px;
      text-align: center;
    }

    /* Calendar grid */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 32px;
    }
    .cal-header {
      padding: 10px 4px;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      background: rgba(255,255,255,0.03);
    }
    .cal-cell {
      min-height: 100px;
      padding: 6px;
      background: rgba(255,255,255,0.015);
      transition: background 0.2s;
      position: relative;
    }
    .cal-cell:hover { background: rgba(255,255,255,0.04); }
    .cal-cell.empty { background: rgba(0,0,0,0.15); }
    .cal-cell.today {
      background: rgba(212,114,122,0.08);
      box-shadow: inset 0 0 0 1px rgba(212,114,122,0.3);
    }
    .cal-day {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .cal-cell.today .cal-day { color: var(--alpenglow); font-weight: 800; }

    /* Event chips */
    .cal-event {
      display: block;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 0.62rem;
      font-weight: 600;
      margin-bottom: 2px;
      text-decoration: none;
      color: #fff;
      line-height: 1.3;
      transition: opacity 0.2s, transform 0.15s;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cal-event:hover { opacity: 0.85; transform: scale(1.02); }
    .cal-event.lecture { background: rgba(240,200,160,0.25); color: var(--lecture-color); border: 1px solid rgba(240,200,160,0.3); }
    .cal-event.quiz { background: rgba(90,154,212,0.25); color: var(--quiz-color); border: 1px solid rgba(90,154,212,0.3); }
    .cal-event.midterm { background: rgba(212,114,122,0.3); color: var(--midterm-color); border: 1px solid rgba(212,114,122,0.4); font-weight: 700; }
    .cal-event.section { background: rgba(90,187,122,0.2); color: var(--section-color); border: 1px solid rgba(90,187,122,0.3); }

    /* Footer */
    footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 20px 0 20px;
    }
    footer a { color: var(--alpenglow); text-decoration: none; }
    footer a:hover { color: var(--alpenglow-warm); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 700px) {
      .cal-cell { min-height: 70px; padding: 4px; }
      .cal-event { font-size: 0.55rem; padding: 2px 4px; }
      .hero h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <div class="page-bg"></div>

  <div class="container">

    <a class="back-link" href="course-navigation.html">&#8592; Back to Course Navigation</a>

    <div class="hero">
      <div class="overline">PSYCH 302 &mdash; Spring 2026</div>
      <h1>Course Calendar</h1>
      <p>Quarter-at-a-glance with lectures, quizzes, midterms, and section activities.</p>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background: var(--lecture-color);"></div> Lecture</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--quiz-color);"></div> Quiz (2 pts)</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--midterm-color);"></div> Midterm (34 pts)</div>
      <div class="legend-item"><div class="legend-dot" style="background: var(--section-color);"></div> Section</div>
    </div>

    <div class="cal-nav">
      <button id="prevMonth">&#8592; Prev</button>
      <div class="month-label" id="monthLabel"></div>
      <button id="nextMonth">Next &#8594;</button>
    </div>

    <div class="cal-grid" id="calGrid"></div>

    <footer>
      PSYCH 302 &mdash; <a href="https://canvas.uw.edu/courses/1888912" target="_blank" rel="noopener">Canvas Course Site</a> &mdash; University of Washington
    </footer>

  </div>

<script>
(function() {
  // ── Course data ──
  // Lectures: Mon & Wed, starting March 30
  const lectures = [
    { num: 1,  date: '2026-03-30', title: 'Toward an Interdisciplinary Science of the Mind' },
    { num: 2,  date: '2026-04-01', title: 'Neurons, Circuits & the Cellular Basis of Computation' },
    { num: 3,  date: '2026-04-06', title: 'From Sensation to Cognition' },
    { num: 4,  date: '2026-04-08', title: 'The Organization of Language and the Brain' },
    { num: 5,  date: '2026-04-13', title: 'Separate Visual Pathways for Perception and Action' },
    { num: 6,  date: '2026-04-15', title: 'Conscious, Preconscious, and Subliminal Processing' },
    { num: 7,  date: '2026-04-20', title: 'The Neuroscience of Emotion' },
    { num: 8,  date: '2026-04-22', title: 'Memory, Organization, and Control' },
    { num: 9,  date: '2026-04-27', title: 'The Multiple-Demand System and Cognitive Control' },
    { num: 10, date: '2026-04-29', title: 'Consciousness and the Damaged Brain' },
    { num: 11, date: '2026-05-06', title: 'Voluntary Action and the Sense of Agency' },
    { num: 12, date: '2026-05-11', title: 'Experimental and Theoretical Approaches to Consciousness' },
    { num: 13, date: '2026-05-13', title: 'Dynamic Models of Large-Scale Brain Activity' },
    { num: 14, date: '2026-05-18', title: 'Whatever Next? Predictive Brains and Situated Agents' },
    { num: 15, date: '2026-05-20', title: 'The Social Brain' },
    { num: 16, date: '2026-05-27', title: 'Cerebral Specialization and the Split Brain' },
    { num: 17, date: '2026-06-01', title: 'Psychedelics and the Entropic Brain' },
  ];

  const quizzes = [
    { num: 1, date: '2026-04-02', pts: 2, canvas: 'https://canvas.uw.edu/courses/1888912/assignments/10888570' },
    { num: 2, date: '2026-04-09', pts: 2, canvas: 'https://canvas.uw.edu/courses/1888912/assignments/10888568' },
    { num: 3, date: '2026-04-16', pts: 2, canvas: 'https://canvas.uw.edu/courses/1888912/assignments/10888586' },
    { num: 4, date: '2026-04-23', pts: 2, canvas: 'https://canvas.uw.edu/courses/1888912/assignments/10888591' },
    { num: 5, date: '2026-04-30', pts: 2, canvas: 'https://canvas.uw.edu/courses/1888912/assignments/10888599' },
    { num: 6, date: '2026-05-07', pts: 2, canvas: 'https://canvas.uw.edu/courses/1888912/assignments/10888624' },
    { num: 7, date: '2026-05-14', pts: 2, canvas: 'https://canvas.uw.edu/courses/1888912/assignments/10888676' },
    { num: 8, date: '2026-05-21', pts: 2, canvas: 'https://canvas.uw.edu/courses/1888912/assignments/10888680' },
    { num: 9, date: '2026-05-28', pts: 2, canvas: 'https://canvas.uw.edu/courses/1888912/assignments/10888687' },
  ];

  const midterms = [
    { num: 1, date: '2026-05-04', pts: 34, canvas: 'https://canvas.uw.edu/courses/1888912/assignments/10888622' },
    { num: 2, date: '2026-06-03', pts: 34, canvas: 'https://canvas.uw.edu/courses/1888912/assignments/10888688' },
  ];

  // Sections: Fridays (weeks 1-9: Apr 3, 10, 17, 24, May 1, 8, 15, 22, 29)
  const sections = [
    { date: '2026-04-03', label: 'Section 1' },
    { date: '2026-04-10', label: 'Section 2' },
    { date: '2026-04-17', label: 'Section 3' },
    { date: '2026-04-24', label: 'Section 4' },
    { date: '2026-05-01', label: 'Section 5' },
    { date: '2026-05-08', label: 'Section 6' },
    { date: '2026-05-15', label: 'Section 7' },
    { date: '2026-05-22', label: 'Section 8' },
    { date: '2026-05-29', label: 'Section 9' },
  ];

  // Build event map: date string -> array of events
  const events = {};
  function addEvent(dateStr, ev) {
    if (!events[dateStr]) events[dateStr] = [];
    events[dateStr].push(ev);
  }

  lectures.forEach(l => {
    addEvent(l.date, {
      type: 'lecture',
      label: `L${l.num}: ${l.title}`,
      short: `L${l.num}`,
      href: `lectures/lecture-${String(l.num).padStart(2,'0')}.html`
    });
  });

  quizzes.forEach(q => {
    addEvent(q.date, {
      type: 'quiz',
      label: `Quiz ${q.num} (${q.pts} pts)`,
      short: `Quiz ${q.num} · ${q.pts}pts`,
      href: q.canvas
    });
  });

  midterms.forEach(m => {
    addEvent(m.date, {
      type: 'midterm',
      label: `Midterm ${m.num} (${m.pts} pts)`,
      short: `Midterm ${m.num} · ${m.pts}pts`,
      href: m.canvas
    });
  });

  sections.forEach(s => {
    addEvent(s.date, {
      type: 'section',
      label: s.label,
      short: s.label,
      href: null
    });
  });

  // Calendar rendering
  const grid = document.getElementById('calGrid');
  const label = document.getElementById('monthLabel');
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // Start at March 2026
  let currentYear = 2026;
  let currentMonth = 2; // 0-indexed: March = 2

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  function render() {
    grid.innerHTML = '';
    label.textContent = `${monthNames[currentMonth]} ${currentYear}`;

    // Day headers
    dayNames.forEach(d => {
      const hdr = document.createElement('div');
      hdr.className = 'cal-header';
      hdr.textContent = d;
      grid.appendChild(hdr);
    });

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell empty';
      grid.appendChild(cell);
    }

    // Day cells
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      cell.className = 'cal-cell';
      if (dateStr === todayStr) cell.classList.add('today');

      const dayNum = document.createElement('div');
      dayNum.className = 'cal-day';
      dayNum.textContent = d;
      cell.appendChild(dayNum);

      const dayEvents = events[dateStr] || [];
      dayEvents.forEach(ev => {
        const chip = document.createElement('a');
        chip.className = `cal-event ${ev.type}`;
        chip.textContent = ev.short;
        chip.title = ev.label;
        if (ev.href) {
          chip.href = ev.href;
          if (ev.href.startsWith('http')) chip.target = '_blank';
        }
        cell.appendChild(chip);
      });

      grid.appendChild(cell);
    }
  }

  document.getElementById('prevMonth').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    render();
  });

  document.getElementById('nextMonth').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    render();
  });

  render();
})();
</script>

</body>
</html>
